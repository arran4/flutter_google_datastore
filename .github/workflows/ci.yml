# Agent rules for generation:
# https://arran4.com/post/2026/006-Github-CI-and-Deploy/
# Built using this post as a reference/guide.
name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ['v*', 'v*.*.*', 'v*.*.*-rc*', 'v*.*.*-beta*', 'test-*']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        default: lint-fix
        options: [lint-fix, build, release-major, release-minor, release-patch, release-test, release-rc, release-alpha, monthly-maintenance]
      release_version_override:
        type: string
        default: ''
      allow_prs:
        type: boolean
        default: true
  schedule:
    - cron: '17 3 1 * *'
    - cron: '41 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write

env:
  FLUTTER_SDK_VERSION: '3.38.7'

jobs:
  route:
    name: Route event
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.route.outputs.run_code_checks }}
      run_pr_meta_checks: ${{ steps.route.outputs.run_pr_meta_checks }}
      run_cleanup: ${{ steps.route.outputs.run_cleanup }}
      run_release: ${{ steps.route.outputs.run_release }}
      is_monthly: ${{ steps.route.outputs.is_monthly }}
      is_nightly: ${{ steps.route.outputs.is_nightly }}
    steps:
      - id: route
        shell: bash
        run: |
          set -euo pipefail
          run_code_checks=false
          run_pr_meta_checks=false
          run_cleanup=false
          run_release=false
          is_monthly=false
          is_nightly=false

          case "${{ github.event_name }}" in
            push)
              run_code_checks=true
              if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                run_release=true
              fi
              ;;
            pull_request)
              if [[ "${{ github.event.action }}" == "closed" ]]; then
                run_cleanup=true
              else
                run_pr_meta_checks=true
                run_code_checks=true
              fi
              ;;
            release)
              run_release=true
              ;;
            workflow_dispatch)
              run_code_checks=true
              if [[ "${{ inputs.mode }}" == release-* ]]; then
                run_release=true
              fi
              if [[ "${{ inputs.mode }}" == "monthly-maintenance" ]]; then
                is_monthly=true
              fi
              if [[ "${{ inputs.mode }}" == "lint-fix" ]]; then
                is_nightly=true
              fi
              ;;
            schedule)
              run_code_checks=true
              if [[ "${{ github.event.schedule }}" == "17 3 1 * *" ]]; then
                is_monthly=true
              fi
              if [[ "${{ github.event.schedule }}" == "41 2 * * *" ]]; then
                is_nightly=true
              fi
              ;;
          esac

          echo "run_code_checks=$run_code_checks" >> "$GITHUB_OUTPUT"
          echo "run_pr_meta_checks=$run_pr_meta_checks" >> "$GITHUB_OUTPUT"
          echo "run_cleanup=$run_cleanup" >> "$GITHUB_OUTPUT"
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"
          echo "is_monthly=$is_monthly" >> "$GITHUB_OUTPUT"
          echo "is_nightly=$is_nightly" >> "$GITHUB_OUTPUT"

  prepare-release-tag:
    name: Prepare release tag
    needs: [route]
    if: ${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.mode, 'release-') }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      next_version: ${{ steps.tag.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup git-tag-inc
        uses: arran4/git-tag-inc-action@v1
        with:
          mode: install
      - id: tag
        env:
          MODE: ${{ inputs.mode }}
          OVERRIDE: ${{ inputs.release_version_override }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$OVERRIDE" ]]; then
            OVERRIDE="${OVERRIDE#v}"
            next_tag="v$OVERRIDE"
          else
            case "$MODE" in
              release-major) level="major"; suffix="" ;;
              release-minor) level="minor"; suffix="" ;;
              release-patch) level="patch"; suffix="" ;;
              release-test)  level="patch"; suffix="test" ;;
              release-rc)    level="patch"; suffix="rc" ;;
              release-alpha) level="patch"; suffix="alpha" ;;
              *) echo "Unsupported release mode: $MODE"; exit 1 ;;
            esac
            if command -v git-tag-inc >/dev/null 2>&1; then
              level="${level#-}"
              args=(-print-version-only "$level")
              [[ -n "$suffix" ]] && args+=("$suffix")
              next_tag=$(git-tag-inc "${args[@]}")
            else
              git fetch --tags --force
              latest=$(git tag -l 'v*' | sed 's/^v//' | sort -V | tail -n 1)
              [[ -z "$latest" ]] && latest='0.0.0'

              if command -v npx >/dev/null 2>&1; then
                case "$level" in
                  major) bumped=$(npx --yes semver "$latest" -i major) ;;
                  minor) bumped=$(npx --yes semver "$latest" -i minor) ;;
                  *) bumped=$(npx --yes semver "$latest" -i patch) ;;
                esac
                next_tag="v${bumped}"
              else
                base="${latest%%-*}"
                IFS='.' read -r maj min pat <<< "$base"
                case "$level" in
                  major) maj=$((maj+1)); min=0; pat=0 ;;
                  minor) min=$((min+1)); pat=0 ;;
                  *) pat=$((pat+1)) ;;
                esac
                next_tag="v${maj}.${min}.${pat}"
              fi

              if [[ -n "$suffix" ]]; then
                next_tag="${next_tag}-${suffix}.1"
              fi
            fi
          fi

          [[ "$next_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]] || {
            echo "Invalid tag format: $next_tag" >&2
            exit 1
          }
          git fetch --tags --force
          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $next_tag" >&2
            echo "Choose a new mode or set release_version_override." >&2
            exit 1
          fi

          echo "release_tag=$next_tag" >> "$GITHUB_OUTPUT"
          clean_tag="${next_tag#v}"; clean_tag="${clean_tag%%-*}"
          IFS='.' read -r maj min pat <<< "$clean_tag"
          echo "next_version=${maj:-0}.${min:-0}.$(( ${pat:-0} + 1 ))-SNAPSHOT" >> "$GITHUB_OUTPUT"

  discover:
    name: Discover capabilities and cost profile
    needs: route
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.profile.outputs.profile }}
      has_go: ${{ steps.detect.outputs.has_go }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_dart: ${{ steps.detect.outputs.has_dart }}
      has_flutter: ${{ steps.detect.outputs.has_flutter }}
      has_qt_cpp: ${{ steps.detect.outputs.has_qt_cpp }}
      has_make_c: ${{ steps.detect.outputs.has_make_c }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_goreleaser: ${{ steps.detect.outputs.has_goreleaser }}
      has_dart_or_flutter_tests: ${{ steps.detect.outputs.has_dart_or_flutter_tests }}
      has_packaging: ${{ steps.detect.outputs.has_packaging }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          echo "has_go=false" >> "$GITHUB_OUTPUT"
          echo "has_node=false" >> "$GITHUB_OUTPUT"
          echo "has_dart=true" >> "$GITHUB_OUTPUT"
          echo "has_flutter=true" >> "$GITHUB_OUTPUT"
          echo "has_qt_cpp=false" >> "$GITHUB_OUTPUT"
          echo "has_make_c=false" >> "$GITHUB_OUTPUT"
          echo "has_docker=false" >> "$GITHUB_OUTPUT"
          echo "has_goreleaser=false" >> "$GITHUB_OUTPUT"
          ([[ -d test ]] || [[ -d tests ]] || [[ -f pubspec.yaml ]]) && echo "has_dart_or_flutter_tests=true" >> "$GITHUB_OUTPUT" || echo "has_dart_or_flutter_tests=false" >> "$GITHUB_OUTPUT"
          ([[ -d packaging ]] || [[ -d pkg ]] || [[ -f debian/control ]]) && echo "has_packaging=true" >> "$GITHUB_OUTPUT" || echo "has_packaging=false" >> "$GITHUB_OUTPUT"
      - id: profile
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event.repository.private }}" == "true" ]]; then
            echo "profile=private" >> "$GITHUB_OUTPUT"
          else
            echo "profile=public" >> "$GITHUB_OUTPUT"
          fi

  flutter-analyze-test:
    name: Flutter analyze/test (fast path)
    needs: [route, discover]
    if: ${{ needs.discover.outputs.has_flutter == 'true' && needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.7'
      - uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
      - run: flutter --version
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos || true
      - run: flutter test --no-pub

  autofix:
    name: Auto-format and open PR
    needs: [route, discover]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'lint-fix' && inputs.allow_prs == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart/Flutter (if needed)
        if: ${{ needs.discover.outputs.has_dart == 'true' || needs.discover.outputs.has_flutter == 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Run autofix formatters
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.discover.outputs.has_dart }}" == "true" || "${{ needs.discover.outputs.has_flutter }}" == "true" ]]; then
            dart format . || true
          fi
      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes; exiting."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PARENT_PR="${{ github.event.pull_request.number || 'none' }}"
          BRANCH="ci/autofix/${{ github.run_id }}-parent-${PARENT_PR}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "ci: automated formatting fixes"
          git push origin "$BRANCH"
          gh pr create             --title "ci: automated formatting fixes"             --body "Automated formatting pass. Parent-PR: ${PARENT_PR}"             --base main             --head "$BRANCH"             --label "ci-autofix"

  cleanup-autofix-prs:
    name: Cleanup autofix PRs on parent close
    needs: [route]
    if: ${{ needs.route.outputs.run_cleanup == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr list --state open --search "label:ci-autofix in:title" --json number,headRefName,body |             jq -r '.[] | select(.body | contains("Parent-PR: '"$PARENT_PR"'")) | [.number, .headRefName] | @tsv' |             while IFS=$'	' read -r pr branch; do
              gh pr close "$pr" --comment "Closing auto-fix PR because parent PR #$PARENT_PR was closed."
              git push origin --delete "$branch" || true
            done

  windows:
    name: Windows build and release
    runs-on: windows-latest
    needs: [route, discover, prepare-release-tag]
    if: ${{ !failure() && !cancelled() && needs.route.outputs.run_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.7'
      - uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
      - name: Set up environment vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ needs.prepare-release-tag.outputs.release_tag }}" ]]; then
            TAG_NAME="${{ needs.prepare-release-tag.outputs.release_tag }}"
            TAG_NAME=${TAG_NAME#v}
          else
            TAG_NAME=$(echo ${GITHUB_REF#refs/tags/v})
          fi
          VERSION="$TAG_NAME"
          echo "SEMANTIC_VERSION=$TAG_NAME" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_ENV
          echo "FLUTTER_APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY_NAME=${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}" >> $GITHUB_ENV
      - name: Update version number
        shell: bash
        run: |
          choco install sed make yq -y
          yq -i '.version = strenv(SEMANTIC_VERSION)' pubspec.yaml
      - name: Release On Windows
        run: |
          flutter pub get
          flutter config --enable-windows-desktop
          dart pub global activate fastforge
          fastforge release --name onwindows
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  linux:
    name: Linux build and release
    runs-on: ubuntu-latest
    needs: [route, discover, prepare-release-tag]
    if: ${{ !failure() && !cancelled() && needs.route.outputs.run_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.7'
      - uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y appstream clang cmake desktop-file-utils fakeroot fuse gir1.2-appindicator3-0.1 libappindicator3-1 libappindicator3-dev libarchive-tools libgdk-pixbuf2.0-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgtk-3-dev libjsoncpp25 libjsoncpp-dev libmpv-dev libnotify-bin libnotify-dev libsecret-1-0 libsecret-1-dev libunwind-dev locate make mpv ninja-build patchelf pkg-config python3-pip python3-setuptools strace tar xmlstarlet
      - name: Install AppImage Tool
        run: |
          wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv -v appimagetool /usr/local/bin/
      - name: Set up environment vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ needs.prepare-release-tag.outputs.release_tag }}" ]]; then
            TAG_NAME="${{ needs.prepare-release-tag.outputs.release_tag }}"
            TAG_NAME=${TAG_NAME#v}
          else
            TAG_NAME=$(echo ${GITHUB_REF#refs/tags/v})
          fi
          VERSION="$TAG_NAME"
          echo "SEMANTIC_VERSION=$TAG_NAME" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_ENV
          echo "FLUTTER_APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY_NAME=${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}" >> $GITHUB_ENV
      - name: Update version number
        run: |
          curl -sS https://webi.sh/yq | sh
          ~/.local/bin/yq -i '.version = strenv(SEMANTIC_VERSION)' pubspec.yaml
      - name: Release On Linux
        run: |
          flutter pub get
          dart pub global activate fastforge
          fastforge release --name onlinux
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  macos:
    name: macOS build and release
    runs-on: macos-15
    needs: [route, discover, prepare-release-tag]
    if: ${{ !failure() && !cancelled() && needs.route.outputs.run_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.10.7'
      - uses: subosito/flutter-action@v2
        with:
          cache: true
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
      - name: Dependencies
        run: |
          python3 -m pip install --break-system-packages setuptools
          npm install --break-system-packages -g appdmg
      - name: Set version environment vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ needs.prepare-release-tag.outputs.release_tag }}" ]]; then
            TAG_NAME="${{ needs.prepare-release-tag.outputs.release_tag }}"
            TAG_NAME=${TAG_NAME#v}
          else
            TAG_NAME=$(echo ${GITHUB_REF#refs/tags/v})
          fi
          VERSION="$TAG_NAME"
          echo "SEMANTIC_VERSION=$TAG_NAME" >> $GITHUB_ENV
          echo "FLUTTER_VERSION=$VERSION" >> $GITHUB_ENV
          echo "FLUTTER_APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY_NAME=${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/}" >> $GITHUB_ENV
      - name: Update version number
        run: |
          brew install yq
          yq -i '.version = strenv(SEMANTIC_VERSION)' pubspec.yaml
      - name: Release On Mac OS X
        run: |
          flutter pub get
          flutter config --enable-macos-desktop
          dart pub global activate fastforge
          fastforge release --name onmac
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  promote-release:
    name: Promote release
    runs-on: ubuntu-latest
    needs:
      - route
      - windows
      - linux
      - macos
      - prepare-release-tag
    if: ${{ !failure() && !cancelled() && needs.route.outputs.run_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: No longer draft
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ needs.prepare-release-tag.outputs.release_tag }}" ]]; then
            gh release edit "${{ needs.prepare-release-tag.outputs.release_tag }}" --draft=false
          else
            gh release edit "$(echo ${GITHUB_REF#refs/tags/})" --draft=false
          fi
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
